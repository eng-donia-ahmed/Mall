    <link rel="stylesheet" href="../CSS/login.css">
    <title>login</title>
</head>
<body>
    <h1>Welcome to the mall</h1>
    <p class="welcome">We hope you a nice experience with us</p>
    <form action="" method="post">
        <h1>Log in</h1>
        First name <br>
        <input type="text" name="firstname"> <br>
        Password <br>
        <input type="password" name="password" id=""> <br><br>
        <input type="submit" value="Submit" class="sub"><br>
         
        <p>Don't have an account? <a href="#">sign up</a></p>
            
        <button type="button"> 
            <img src="../images/facebook_logo.png" alt="">

        </button> <br><br>

        <button type="button" class="g">

            Log in with google
        </button>
        
    </form>
