<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- //google fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- css -->
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sign up</title>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="welcome">
                <h1>Welcome</h1>
                <p>Hello in this mall here you can get any thing you need</p>
            </div>
            <form id="form">
                <h1>sign up</h1>
                <label for="name">Name</label>
                <input type="text" id="name">
                <div id="name-error" class="error-message">Please fill this</div>
                <label for="email">E-mail</label>
                <input type="email" id="email">
                <div id="e-error" class="error-message">Please fill this</div>
                <label for="password">Password</label>
                <input type="password" id="password">
                <div id="p-error" class="error-message">Please fill this</div>
                <input type="submit" >
                <pre>---------------<span>OR</span>---------------</pre>
                <div class="facebook">
                    <a href="https://www.facebook.com/">
                        <i class="fa-brands fa-facebook"></i>
                    </a>
                    <p>with facebook</p>
                </div>
                <div class="google">
                    <a href="https://passwords.google.com/?hl=ar&pli=1">
                        <i class="fa-brands fa-google"></i>
                    </a>
                    <p>with google</p>
                </div>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
